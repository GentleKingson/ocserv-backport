---
name: ci

"on":
  push:
    paths:
      - 'scripts/**'
      - 'test/**'
      - 'source-lock/**'
      - 'Makefile'
      - 'README.md'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'test/**'
      - 'source-lock/**'
      - 'Makefile'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      target:
        description: CI target to run
        required: true
        default: checks
        type: choice
        options:
          - checks
          - source-package
          - all
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  checks:
    if: >-
      ${{
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.target == 'checks' || inputs.target == 'all')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install check dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bats \
            python3-yaml \
            shellcheck \
            yamllint

      - name: Bash syntax
        run: |
          find scripts -type f \( -name '*.sh' -o ! -name '*.*' \) -print0 \
            | xargs -0 -r bash -n

      - name: ShellCheck
        run: |
          find scripts -type f \( -name '*.sh' -o ! -name '*.*' \) -print0 \
            | xargs -0 -r shellcheck -x

      - name: Python syntax
        run: python3 -m compileall scripts test

      - name: YAML lint
        run: yamllint .github source-lock

      - name: Verify source lock projection
        run: make verify-lock

      - name: Unit tests
        run: make test

      - name: Entrypoint orchestration tests
        run: make ci-script-test

  source-package:
    if: >-
      ${{
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.target == 'source-package' || inputs.target == 'all')
        )
      }}
    runs-on: ubuntu-latest
    env:
      TARGET_ARCH: amd64
    container:
      image: debian:trixie

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git

      - uses: actions/checkout@v6

      - name: Install source package dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            build-essential \
            ca-certificates \
            curl \
            debhelper \
            debian-archive-keyring \
            debian-keyring \
            debian-maintainers \
            devscripts \
            dpkg-dev \
            fakeroot \
            gnupg \
            make \
            python3 \
            python3-yaml \
            xz-utils

      - name: Refresh Debian source verification keyrings
        run: |
          set -eu

          workdir="$(mktemp -d)"
          mkdir -p \
            "${workdir}/lists/partial" \
            "${workdir}/sourceparts"

          cat > "${workdir}/sid.sources" <<'EOF'
          Types: deb
          URIs: http://deb.debian.org/debian
          Suites: sid
          Components: main
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
          EOF

          apt_sid() {
            apt-get \
              -o "Dir::Etc::sourcelist=${workdir}/sid.sources" \
              -o "Dir::Etc::sourceparts=${workdir}/sourceparts" \
              -o "Dir::State::lists=${workdir}/lists" \
              -o "APT::Get::List-Cleanup=0" \
              "$@"
          }

          apt_sid update

          (
            cd "${workdir}"
            apt_sid download \
              debian-archive-keyring \
              debian-keyring
          )

          keyring_root="${workdir}/root"
          mkdir -p "${keyring_root}"
          for deb in "${workdir}"/*.deb; do
            dpkg-deb -x "${deb}" "${keyring_root}"
          done

          keyrings="$(
            find "${keyring_root}/usr/share/keyrings" \
              -maxdepth 1 \
              -type f \
              \( -name 'debian-*.gpg' -o -name 'debian-*.pgp' \) \
              -print \
              | sort \
              | paste -sd: -
          )"

          if [ -z "${keyrings}" ]; then
            echo "no Debian keyrings extracted from sid packages" >&2
            exit 1
          fi

          printf 'DSCVERIFY_KEYRING_PATHS=%s\n' "${keyrings}" >> "${GITHUB_ENV}"

      - name: Build source package
        run: make source-ci
