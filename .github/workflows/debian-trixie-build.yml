---
name: debian-trixie-build

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debian-trixie-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      TARGET_ARCH: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Ensure enough runner disk space
        run: |
          set -euo pipefail

          min_free_gib=8
          min_free_kb=$((min_free_gib * 1024 * 1024))

          echo "== Disk before cleanup =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk space on /."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "Free disk below ${min_free_gib} GiB; cleaning payloads."

            sudo rm -rf \
              /usr/share/dotnet \
              /usr/local/lib/android \
              /usr/local/share/boost \
              /usr/local/.ghcup \
              /opt/ghc \
              /opt/hostedtoolcache/CodeQL || true

            docker system prune -af || true
          else
            echo "Free disk >= ${min_free_gib} GiB; skipping cleanup."
          fi

          echo "== Disk after cleanup check =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk after cleanup."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "::error::Insufficient free disk; need ${min_free_gib} GiB."
            exit 1
          fi

      - name: Build and test Debian Trixie packages
        run: |
          set -euo pipefail
          printf 'yes\n' \
            | sudo --preserve-env=TARGET_ARCH \
              ./scripts/debian-auto-build.sh --provision

      - name: Upload Debian Trixie artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: debian-trixie-build-amd64
          if-no-files-found: error
          path: |
            build/source/ocserv_*.dsc
            build/source/ocserv_*.debian.tar.*
            build/source/ocserv_*.orig.tar.*
            build/source/ocserv_*_source.changes
            build/source/ocserv_*_source.buildinfo
            build/binary/ocserv_*.deb
            build/binary/ocserv_*.changes
            build/binary/ocserv_*.buildinfo

      - name: Prepare Debian Trixie build logs
        if: failure()
        run: |
          set -euo pipefail
          upload_dir="${RUNNER_TEMP}/debian-trixie-upload-logs"
          rm -rf "${upload_dir}"
          mkdir -p "${upload_dir}"
          while IFS= read -r -d '' log_path; do
            rel="${log_path#./}"
            safe_name="${rel//:/_}"
            mkdir -p "${upload_dir}/$(dirname -- "${safe_name}")"
            cp -- "${log_path}" "${upload_dir}/${safe_name}"
          done < <(
            find build \
              -type f \
              \( -name '*.build' -o -name '*.buildlog' -o -name '*.log' \) \
              -print0 2>/dev/null || true
          )

      - name: Upload Debian Trixie build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: debian-trixie-build-logs-amd64
          if-no-files-found: warn
          path: ${{ runner.temp }}/debian-trixie-upload-logs/**
