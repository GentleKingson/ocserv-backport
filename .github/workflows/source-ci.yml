---
name: source-ci

"on":
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  source-package:
    runs-on: ubuntu-latest
    env:
      TARGET_ARCH: amd64
    container:
      image: debian:trixie

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git

      - uses: actions/checkout@v6

      - name: Install source package dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            build-essential \
            ca-certificates \
            curl \
            debhelper \
            debian-archive-keyring \
            debian-keyring \
            debian-maintainers \
            devscripts \
            dpkg-dev \
            fakeroot \
            gnupg \
            make \
            python3 \
            python3-yaml \
            xz-utils

      - name: Build source package
        run: make source-ci

      - name: Stage source package artifacts
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/source-package-artifacts"
          target_source="build/debian/trixie/${TARGET_ARCH}/source"
          staged_root="${staging}/build/debian/trixie/${TARGET_ARCH}"
          rm -rf "${staging}"
          mkdir -p "${staged_root}"
          cp -a "${target_source}" "${staged_root}/"

      - name: Upload source package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ocserv-source-package
          if-no-files-found: error
          path: ${{ runner.temp }}/source-package-artifacts/**
