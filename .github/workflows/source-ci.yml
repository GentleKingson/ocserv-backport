---
name: source-ci

"on":
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  source-package:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    steps:
      - name: Install checkout dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git

      - uses: actions/checkout@v4

      - name: Install source package dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            build-essential \
            ca-certificates \
            curl \
            debhelper \
            debian-archive-keyring \
            debian-keyring \
            debian-maintainers \
            devscripts \
            dpkg-dev \
            fakeroot \
            gnupg \
            make \
            python3 \
            python3-yaml \
            xz-utils

      - name: Build source package
        run: make source-ci

      - name: Upload source package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocserv-source-package
          if-no-files-found: error
          path: |
            build/source/ocserv_*.dsc
            build/source/ocserv_*.debian.tar.*
            build/source/ocserv_*.orig.tar.*
            build/source/ocserv_*_source.changes
            build/source/ocserv_*_source.buildinfo
