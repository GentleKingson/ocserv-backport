---
name: ubuntu-noble-build

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-noble-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      TARGET_ARCH: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Ensure enough runner disk space
        run: |
          set -euo pipefail

          min_free_gib=8
          min_free_kb=$((min_free_gib * 1024 * 1024))

          echo "== Disk before cleanup =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk space on /."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "Free disk is below ${min_free_gib} GiB; cleaning unused hosted runner payloads."

            sudo rm -rf \
              /usr/share/dotnet \
              /usr/local/lib/android \
              /usr/local/share/boost \
              /usr/local/.ghcup \
              /opt/ghc \
              /opt/hostedtoolcache/CodeQL || true

            docker system prune -af || true
          else
            echo "Free disk is already >= ${min_free_gib} GiB; skipping cleanup."
          fi

          echo "== Disk after cleanup check =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk space on / after cleanup."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "::error::Insufficient free disk on / after cleanup; need at least ${min_free_gib} GiB."
            exit 1
          fi

      - name: Build and test Ubuntu Noble packages
        run: |
          set -euo pipefail
          printf 'yes\n' \
            | sudo --preserve-env=TARGET_ARCH \
              ./scripts/noble-auto-build.sh --provision

      - name: Upload Ubuntu Noble artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-noble-build-amd64
          if-no-files-found: error
          path: |
            build/noble/amd64/source/node-undici/*.dsc
            build/noble/amd64/source/node-undici/*.debian.tar.*
            build/noble/amd64/source/node-undici/*.orig.tar.*
            build/noble/amd64/source/node-undici/*_source.changes
            build/noble/amd64/source/node-undici/*_source.buildinfo
            build/noble/amd64/source/ocserv/*.dsc
            build/noble/amd64/source/ocserv/*.debian.tar.*
            build/noble/amd64/source/ocserv/*.orig.tar.*
            build/noble/amd64/source/ocserv/*_source.changes
            build/noble/amd64/source/ocserv/*_source.buildinfo
            build/noble/amd64/binary/node-undici/*.deb
            build/noble/amd64/binary/node-undici/*.changes
            build/noble/amd64/binary/node-undici/*.buildinfo
            build/noble/amd64/binary/ocserv/*.deb
            build/noble/amd64/binary/ocserv/*.changes
            build/noble/amd64/binary/ocserv/*.buildinfo
            build/noble/amd64/repo/**

      - name: Prepare Ubuntu Noble build logs
        if: failure()
        run: |
          set -euo pipefail
          upload_dir="${RUNNER_TEMP}/noble-upload-logs"
          rm -rf "${upload_dir}"
          mkdir -p "${upload_dir}"
          while IFS= read -r -d '' log_path; do
            rel="${log_path#./}"
            safe_name="${rel//:/_}"
            mkdir -p "${upload_dir}/$(dirname -- "${safe_name}")"
            cp -- "${log_path}" "${upload_dir}/${safe_name}"
          done < <(
            find build/noble \
              -type f \
              \( -name '*.build' -o -name '*.buildlog' -o -name '*.log' \) \
              -print0 2>/dev/null || true
          )
          while IFS= read -r -d '' log_path; do
            safe_name="tmp/$(basename -- "${log_path}")"
            safe_name="${safe_name//:/_}"
            mkdir -p "${upload_dir}/$(dirname -- "${safe_name}")"
            cp -- "${log_path}" "${upload_dir}/${safe_name}"
          done < <(
            find /tmp \
              -maxdepth 1 \
              -type f \
              -name 'noble-libllhttp-repo.*.log' \
              -print0 2>/dev/null || true
          )

      - name: Upload Ubuntu Noble build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-noble-build-logs-amd64
          if-no-files-found: warn
          path: ${{ runner.temp }}/noble-upload-logs/**
