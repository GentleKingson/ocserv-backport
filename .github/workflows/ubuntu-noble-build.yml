---
name: ubuntu-noble-build

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-noble-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      TARGET_ARCH: amd64

    steps:
      - uses: actions/checkout@v6

      - name: Ensure enough runner disk space
        run: |
          set -euo pipefail

          min_free_gib=8
          min_free_kb=$((min_free_gib * 1024 * 1024))

          echo "== Disk before cleanup =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk space on /."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "Free disk below ${min_free_gib} GiB; cleaning payloads."

            sudo rm -rf \
              /usr/share/dotnet \
              /usr/local/lib/android \
              /usr/local/share/boost \
              /usr/local/.ghcup \
              /opt/ghc \
              /opt/hostedtoolcache/CodeQL || true

            docker system prune -af || true
          else
            echo "Free disk >= ${min_free_gib} GiB; skipping cleanup."
          fi

          echo "== Disk after cleanup check =="
          df -h / "$GITHUB_WORKSPACE" /tmp

          avail_kb="$(df --output=avail / | tail -n1 | tr -d '[:space:]')"

          if ! [[ "${avail_kb}" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine free disk after cleanup."
            exit 1
          fi

          if (( avail_kb < min_free_kb )); then
            echo "::error::Insufficient free disk; need ${min_free_gib} GiB."
            exit 1
          fi

      - name: Build and test Ubuntu Noble packages
        run: |
          set -euo pipefail
          printf 'yes\n' \
            | sudo --preserve-env=TARGET_ARCH \
              ./scripts/noble-auto-build.sh --provision

      - name: Stage Ubuntu Noble artifacts
        if: success()
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/ubuntu-noble-artifacts"
          target_root="build/ubuntu/noble/${TARGET_ARCH}"
          staged_root="${staging}/${target_root}"
          rm -rf "${staging}"
          mkdir -p \
            "${staged_root}/source/node-undici" \
            "${staged_root}/source/ocserv" \
            "${staged_root}/binary/node-undici" \
            "${staged_root}/binary/ocserv" \
            "${staged_root}/repo"
          find "${target_root}/source/node-undici" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*.dsc' \
              -o -name '*.debian.tar.*' \
              -o -name '*.orig.tar.*' \
              -o -name '*_source.changes' \
              -o -name '*_source.buildinfo' \
            \) \
            -exec cp -- {} "${staged_root}/source/node-undici/" \;
          find "${target_root}/source/ocserv" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*.dsc' \
              -o -name '*.debian.tar.*' \
              -o -name '*.orig.tar.*' \
              -o -name '*_source.changes' \
              -o -name '*_source.buildinfo' \
            \) \
            -exec cp -- {} "${staged_root}/source/ocserv/" \;
          find "${target_root}/binary/node-undici" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*.deb' \
              -o -name '*.changes' \
              -o -name '*.buildinfo' \
            \) \
            -exec cp -- {} "${staged_root}/binary/node-undici/" \;
          find "${target_root}/binary/ocserv" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*.deb' \
              -o -name '*.changes' \
              -o -name '*.buildinfo' \
            \) \
            -exec cp -- {} "${staged_root}/binary/ocserv/" \;
          find "${target_root}/repo" \
            -maxdepth 1 \
            -type f \
            \( \
              -name '*.deb' \
              -o -name 'Packages' \
              -o -name 'Packages.gz' \
            \) \
            -exec cp -- {} "${staged_root}/repo/" \;

      - name: Upload Ubuntu Noble artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-noble-build-amd64
          if-no-files-found: error
          path: ${{ runner.temp }}/ubuntu-noble-artifacts/**

      - name: Prepare Ubuntu Noble build logs
        if: failure()
        run: |
          set -euo pipefail
          upload_dir="${RUNNER_TEMP}/noble-upload-logs"
          rm -rf "${upload_dir}"
          mkdir -p "${upload_dir}"
          while IFS= read -r -d '' log_path; do
            rel="${log_path#./}"
            safe_name="${rel//:/_}"
            mkdir -p "${upload_dir}/$(dirname -- "${safe_name}")"
            cp -- "${log_path}" "${upload_dir}/${safe_name}"
          done < <(
            find build/ubuntu/noble \
              -type f \
              \( -name '*.build' -o -name '*.buildlog' -o -name '*.log' \) \
              -print0 2>/dev/null || true
          )
          while IFS= read -r -d '' log_path; do
            safe_name="tmp/$(basename -- "${log_path}")"
            safe_name="${safe_name//:/_}"
            mkdir -p "${upload_dir}/$(dirname -- "${safe_name}")"
            cp -- "${log_path}" "${upload_dir}/${safe_name}"
          done < <(
            find /tmp \
              -maxdepth 1 \
              -type f \
              -name 'noble-libllhttp-repo.*.log' \
              -print0 2>/dev/null || true
          )

      - name: Upload Ubuntu Noble build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-noble-build-logs-amd64
          if-no-files-found: warn
          path: ${{ runner.temp }}/noble-upload-logs/**
